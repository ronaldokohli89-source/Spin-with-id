<html lang="en">

    <title>Royal Vegas 12 - Midnight Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

 <style>
        :root {
            /* THEME: Midnight Casino Red & Gold */
            --bg-gradient: radial-gradient(circle at center, #3a0000 0%, #0a0a0a 100%);
            --glass-panel: rgba(15, 15, 15, 0.85);
            --border-neon: 1px solid #d4af37;
            --text-gold: #ffd700;
            --text-cyan: #ffffff;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #0a0a0a; 
            background-image: var(--bg-gradient);
            color: #f5f5f5;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            display: flex; /* Restored for direct body flex */
            flex-direction: column; /* Restored */
        }

        /* --- TOP BAR --- */
        .top-bar { 
            height: 70px; 
            flex-shrink: 0; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            padding: 0 30px; 
            background: rgba(10, 10, 10, 0.95); 
            border-bottom: var(--border-neon);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        .top-left { display: flex; align-items: center; gap: 20px; }
        .top-right { display: flex; justify-content: flex-end; align-items: center; }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            background: linear-gradient(to right, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        /* TIMER */
        .timer-box { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 36px; 
            font-weight: bold;
            color: var(--text-gold);
            background: #111;
            padding: 4px 40px; 
            border-radius: 8px; 
            border: 2px solid #d4af37;
            letter-spacing: 3px;
            text-align: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
        
        /* VOLUME BOX */
        .vol-box { 
            text-align: right; 
            background: transparent; 
            padding: 5px 20px; 
            border-right: 3px solid var(--text-gold); 
            cursor: pointer; 
            transition: 0.3s;
        }
        .vol-box:hover { background: rgba(0,0,0,0.03); border-radius: 4px; }
        .vol-box small { color: #aaa; }
        .vol-box span { color: var(--text-gold); }
        .vol-positive { color: #28a745; }
        .vol-negative { color: #d32f2f; }

       /* --- MAIN LAYOUT --- */
      .game-hud { 
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 120px minmax(0, 1.3fr); 
            align-items: center; 
            gap: 2vw; 
            padding: 1vw 3vw; 
            height: calc(100vh - 70px); /* Restored to vh */
            max-width: 1800px;
            margin: 0 auto;
            overflow: hidden; 
        }

        /* PANEL STYLES */
        .panel {
            background: var(--glass-panel);
            backdrop-filter: blur(12px);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 2vh 20px; 
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 0;
        }

        /* --- BETTING GRID --- */
      .grid-12 { 
            display: grid; 
            grid-template-columns: repeat(4, minmax(0, 1fr)) 60px; 
            gap: 1.5vw; 
            width: 100%; 
            margin-bottom: 1vh; 
        }
        
        .grid-12.locked { filter: grayscale(100%) brightness(0.9); pointer-events: none; opacity: 0.7; }

        .num-btn { 
            aspect-ratio: 2.5 / 3.5; 
            width: 100%;
            height: auto; 
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            padding: 0; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            position: relative;
        }
        
        .num-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4); 
        }
        .num-btn:active { transform: translateY(2px); box-shadow: none; }
        
        .num-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ALL BUTTONS */
        .group-bet-btn {
            background: linear-gradient(135deg, #fdfbfb 0%, #EAE5D9 100%);
            border: 1px solid rgba(212, 175, 55, 0.6);
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
            font-family: 'Cinzel', serif;
            padding: 4px;
        }
        .group-bet-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(212, 175, 55, 0.4);
            background: #fff;
        }
        .group-bet-btn:active { transform: translateY(1px); }

        /* --- CHIPS --- */
        .chip-rack { 
            display: flex; justify-content: space-around; 
            background: rgba(255,255,255,0.05); 
            padding: 12px; 
            border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.1); 
            margin-top: auto;
        }

        .chip { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-family: 'Roboto', sans-serif; font-size: 14px; color: white;
            cursor: pointer; border: 2px dashed rgba(255,255,255,0.8); 
            box-shadow: 0 3px 5px rgba(0,0,0,0.2); 
            transition: 0.2s; 
        }
        .chip:hover { transform: translateY(-5px); }
        .chip.active { 
            border-style: solid; border-color: #333; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); 
            transform: scale(1.15) translateY(-8px); z-index: 2; 
        }
        .c5 { background: radial-gradient(#8e2de2, #4a00e0); }
        .c10 { background: radial-gradient(#00c6ff, #0072ff); } 
        .c20 { background: radial-gradient(#ff416c, #ff4b2b); } 
        .c50 { background: radial-gradient(#56ab2f, #a8e063); color: black; border-color: rgba(0,0,0,0.3); } 
        .c100 { background: radial-gradient(#333, #111); border-color: var(--text-gold); color: var(--text-gold); }

        /* --- WHEEL AREA --- */
        .wheel-container { 
            position: relative; 
            width: 100%; 
            max-width: 55vh; 
            max-height: 55vh; 
            aspect-ratio: 1 / 1; 
            margin: 0 auto; 
            border-radius: 50%; 
            padding: 12px;
            background: conic-gradient(from 0deg, #d4af37, #fcf6ba, #d4af37, #fcf6ba, #d4af37);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
       
        .wheel-inner {
            width: 100%;
            height: 100%;
            border: 8px solid #d4af37;
            background: #111;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; border-radius: 50%; display: block; }
        
        #pointer { 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; height: 0; 
            border-left: 15px solid transparent; 
            border-right: 15px solid transparent; 
            border-top: 40px solid #d32f2f; 
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3)); 
            z-index: 5; 
        }

        /* --- STATUS & HISTORY --- */
        .status-msg { 
            margin-top: 20px; 
            font-family: 'Cinzel', serif; 
            font-size: 24px; 
            font-weight: bold; letter-spacing: 4px; 
            text-align: center; 
            color: var(--text-gold); 
            text-transform: uppercase;
        }
        .status-msg.locked-msg { color: #d32f2f; }

      #unifiedHistoryBar {
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            margin-top: 15px; 
            flex-wrap: nowrap; 
            width: 100%;
        }

        /* STATS MIDDLE PANEL */
        .stats-panel {
            background: var(--glass-panel);
            border: var(--border-neon); 
            border-radius: 12px;
            padding: 30px 15px; 
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; 
            align-items: center;
            min-height: 280px; 
            align-self: center;
            gap: 10px; 
        }
        .divider { 
            width: 80%; 
            height: 1px; 
            background: rgba(212, 175, 55, 0.3); 
            margin: 5px 0; 
        }
        .stat-box { text-align: center; width: 100%; }
        .stat-box small { color: var(--text-gold); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        .stat-box div { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; margin-top: 5px; }

        .stat-win { color: #28a745 !important; text-shadow: 0 0 10px rgba(40,167,69,0.3); }
        .stat-loss { color: #ff1744 !important; text-shadow: 0 0 10px rgba(255,23,68,0.3); }
        .stat-neutral { color: #fff !important; }

        /* WIN ANIMATION BOX */
        .win-box { 
            text-align: center; font-size: 26px; margin: 10px 0; min-height: 40px; 
            color: #28a745; font-family: 'Orbitron', sans-serif; font-weight: bold; opacity: 0; transition: opacity 0.5s; 
        }
        .win-box.show { opacity: 1; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* BUTTONS */
        .btn-print { 
            width: 100%; 
            padding: 1.2vh; 
            font-size: 14px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            background: linear-gradient(45deg, #d4af37, #ffd700); 
            border: none; border-radius: 6px; cursor: pointer; color: #222; 
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); transition: 0.3s; 
            margin-top: 1vh !important; 
        }
        .btn-print:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(212, 175, 55, 0.5); }

        .logout-btn { 
            background: #1a0000; color: #d4af37; border: 1px solid #d4af37; 
            padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; 
            letter-spacing: 1px; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); 
        }
        .logout-btn:hover { border-color: #ff1744; color: #fff; background: #d32f2f; box-shadow: 0 0 10px rgba(211, 47, 47, 0.4); }

        .add-money-btn {
            background: linear-gradient(45deg, #28a745, #218838); color: white; border: none; padding: 8px 15px; margin-right: 15px;
            border-radius: 4px; font-weight: bold; font-size: 12px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3); transition: 0.3s; letter-spacing: 1px;
        }
        .add-money-btn:hover { transform: scale(1.05); box-shadow: 0 6px 15px rgba(40, 167, 69, 0.5); }

        .fullscreen-btn {
            margin-top: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #aaa;
            padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'Roboto', sans-serif;
            font-size: 10px; letter-spacing: 2px; transition: all 0.3s; text-transform: uppercase;
        }
        .fullscreen-btn:hover { border-color: #d4af37; color: #ffd700; background: rgba(255,255,255,0.05); }

        #coinCanvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* --- LAPTOP FLUID HEIGHT FIX (Replaces Transform Scale) --- */
        @media screen and (max-width: 1400px), screen and (max-height: 800px) {
            /* Shrink top bar to save space */
            .top-bar { height: 55px; }
            .game-hud { height: calc(100vh - 55px); padding: 10px 2vw; gap: 1.5vw; }
            
            /* Restrict wheel height */
            .wheel-container { max-width: 42vh; max-height: 42vh; }
            
            /* Tighter panels and cards */
            .panel { padding: 10px 15px; }
            .grid-12 { gap: 6px; margin-bottom: 5px; }
            .group-bet-btn { padding: 2px; font-size: 11px; }
            
            /* Smaller chips so they fit at the bottom */
            .chip { width: 38px; height: 38px; font-size: 13px; }
            .chip-rack { padding: 8px; margin-top: 5px; }
            
            /* Keep history bar clean */
            .status-msg { margin-top: 10px; font-size: 20px; }
            #unifiedHistoryBar { margin-top: 10px; }
            
            /* Stats panel adjustments */
            .stats-panel { min-height: 220px; padding: 15px 10px; }
            .btn-print { padding: 0.8vh; margin-top: 0.5vh !important; }
        }

        @media (max-width: 950px) {
            body { overflow-y: auto; height: auto; display: block; }
            .game-hud { 
                grid-template-columns: 1fr; 
                height: auto; 
                gap: 20px; 
            }
            .stats-panel { height: auto; flex-direction: row; justify-content: space-around; padding: 15px; }
            .divider { width: 1px; height: 50px; margin: 0 20px; }
            .wheel-container { max-width: 400px; max-height: 400px; }
            .left-panel { max-height: none; }
            .grid-12 { max-width: 500px; margin: 0 auto 15px auto; }
        }
        
        /* Mobile Phones (Compact Mode) */
        @media (max-width: 600px) {
            .top-bar { padding: 0 10px; gap: 5px; height: 60px; }
            .top-left { gap: 5px; }
            .logo-text { font-size: 12px; }
            .timer-box { font-size: 16px; padding: 4px 10px; }
            .vol-box { padding: 2px 5px; border-right: none; margin-right: 0; }
            .vol-box small { font-size: 8px; }
            .add-money-btn, .logout-btn { padding: 4px 8px; font-size: 9px; margin-right: 5px; }
            
            .wheel-container { max-width: 300px; max-height: 300px; }
            .grid-12 { grid-template-columns: repeat(4, 1fr) 45px; gap: 5px; width: 100%; }
            .group-bet-btn { font-size: 9px; padding: 2px; }
            
            .chip-rack { flex-wrap: wrap; justify-content: center; gap: 8px; padding: 8px; }
            .chip { width: 35px; height: 35px; font-size: 12px; }
            
            .stats-panel { flex-direction: column; gap: 10px; }
            .divider { width: 100%; height: 1px; margin: 5px 0; }
        }

        @media print {
            * { color: black !important; background: transparent !important; text-shadow: none !important; box-shadow: none !important; backdrop-filter: none !important; filter: none !important; }
            @page { margin: 0; size: 58mm auto; }
            body { width: 55mm; margin: 0 auto; padding: 0; font-family: 'Courier New', monospace; font-size: 11px; display: block !important; height: auto !important; overflow: visible !important; }
            body > *:not(.game-hud), .top-bar, .left-panel, .center-panel, .admin-trigger, .win-box, .fullscreen-btn, .chip-rack, .grid-12, #timer, .slip-header, .btn-print, #securityOverlay { display: none !important; }
            .game-hud, .panel, .slip-panel { display: block !important; width: 100% !important; height: auto !important; border: none !important; margin: 0 !important; padding: 2px !important; grid-template-columns: 1fr !important; }
            table { width: 100%; border-collapse: collapse; table-layout: fixed; }
            th { border-bottom: 1px solid #000 !important; font-size: 10px; text-align: left; }
            td { border-bottom: 1px dashed #666 !important; padding: 3px 0; font-size: 12px; font-weight: bold; }
        }
</style>

    // 2. DISABLE KEYBOARD SHORTCUTS (F12, Ctrl+Shift+I, Ctrl+U, etc.)
    document.onkeydown = function(e) {

        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I

        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C

            return false;
        }

        function drawWheel() {
    canvas.width = 1000;
    canvas.height = 1000;

    const centerX = 500;
    const centerY = 500;
    const radius = 480;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const colors = ["#8b0000", "#111111"];

    for (let i = 0; i < sectors; i++) {
        const angle = i * arc;
        const card = CARD_MAP[i];

        // 1. Draw Slice
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, angle, angle + arc);
        ctx.closePath();

        ctx.fillStyle = colors[i % 2];
        ctx.fill();

        // 2. Draw Gold Border
        ctx.strokeStyle = "#ffd700";
        ctx.lineWidth = 6;
        ctx.stroke();

        // 3. Draw Text
        ctx.save();
        
        ctx.translate(centerX, centerY);
        ctx.rotate(angle + arc / 2); // Rotate to point down the middle of the slice
        ctx.translate(330, 0);       // Move 330px outwards toward the edge
        ctx.rotate(-(angle + arc / 2));

        // ❌ DELETED the reverse rotation here so it stays inside the slice!

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = (colors[i % 2] === "#111111") ? "#ffd700" : "#ffffff";

        ctx.font = "bold 80px Cinzel";
        ctx.fillText(card.rank, 0, -20);

        ctx.font = "bold 90px Cinzel";  // ← suit bigger
ctx.fillText(card.suit, 0, 60);

        ctx.restore();
    }

    // Draw Center Hubs
    ctx.beginPath();
    ctx.arc(centerX, centerY, 80, 0, Math.PI * 2);
    ctx.fillStyle = "#ffd700";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
    ctx.fillStyle = "#333";
    ctx.fill();
}

     function updateWallet(amount, description) {
    if (!clientID) return;
    const numAmt = parseFloat(amount); // Force strict number

    // 1. Update Balance in Database
    db.ref('users/' + clientID + '/balance').transaction((currentBal) => {
        return parseFloat(currentBal || 0) + numAmt; // Prevents string bugs
    }, (error, committed, snapshot) => {
        if (error) {
            console.error("Wallet Error:", error);
        } else if (committed) {
            // 2. Add to History (Passbook)
           db.ref('users/' + clientID + '/transactions').push({
    amount: numAmt,
    balance: snapshot.val(),
    description: description,
    date: new Date().toLocaleString(),
    billNo: dailyBillCount,
    spin_count: currentSpinCount + 1,  // 🟢 FIXED: Logs the UPCOMING spin
    timestamp: Date.now()              // 🟢 Added for the 48-hour auto-cleanup
});

            // Get standard timezone string for daily checks
            const todayStr = new Intl.DateTimeFormat('en-IN', { timeZone: 'Asia/Kolkata' }).format(new Date());

            // 3. Update House Stats & Personal Daily Stats
            if (numAmt < 0) {
                // --- A. Bet Placed ---
                
                // Add to Global House Volume
                db.ref('house_stats/daily_volume').transaction(vol => parseFloat(vol || 0) + Math.abs(numAmt));
                
                // Add to User's 24H Play Amount
                dailyPlayAmount += Math.abs(numAmt);
                db.ref('user_daily_stats/' + clientID).update({
                    play: dailyPlayAmount,
                    date: todayStr
                });

            } else if (description.includes("Cancelled")) {
                // --- B. Bet Cancelled ---
                
                // Subtract from Global House Volume
                db.ref('house_stats/daily_volume').transaction(vol => {
                    let newVol = parseFloat(vol || 0) - Math.abs(numAmt);
                    return newVol < 0 ? 0 : newVol; // Safety check
                });
                
                // Subtract from User's 24H Play Amount
                dailyPlayAmount -= Math.abs(numAmt);
                if (dailyPlayAmount < 0) dailyPlayAmount = 0; // Safety check
                
                db.ref('user_daily_stats/' + clientID).update({
                    play: dailyPlayAmount,
                    date: todayStr
                });
            }
        }
    });
}

}

function clearVisualBets() {
    document.querySelectorAll('[id^="badge-"]').forEach(el => el.style.display = 'none');
    document.querySelectorAll('[id^="minus-"]').forEach(el => el.style.display = 'none');
}
        // --- GAMEPLAY ACTIONS ---
        function lockBets() {
            if(betsLocked) return; betsLocked = true;
            document.getElementById('grid').classList.add('locked');
            const msg = document.getElementById('msg'); msg.innerText = "BETS CLOSED"; msg.classList.add('locked-msg');
        }
        function unlockBets() {
            betsLocked = false;
            document.getElementById('grid').classList.remove('locked');
            const msg = document.getElementById('msg'); msg.innerText = "Results"; msg.classList.remove('locked-msg');
            bets = {}; cycleBets = {}; 
            localStorage.setItem('vegas_active_bets', '{}');
            localStorage.setItem('vegas_cycle_bets', '{}');
            renderSlip();
            clearVisualBets();
            
            // 🟢 NEW: RESET STATS UI FOR NEW ROUND
            updateRoundStats(); 
            const wlBox = document.getElementById('roundWinLoss');
            wlBox.innerText = "-";
            wlBox.className = "stat-neutral";
        }

        function performSpin(serverResult, serverMulti) {
            if(isSpinning) return;
            isSpinning = true;
            lockBets();

            // 1. CLEAR PREVIOUS 2-MINUTE TIMER (If new spin starts early)
            if (visualCleanupTimer) {
                clearTimeout(visualCleanupTimer);
                visualCleanupTimer = null;
                document.getElementById('winDisplay').classList.remove('show'); // Hide old win immediately
            }

            // 2. CALCULATE ROTATION (Additive Math)
            const deg = 360 / 12;
            const targetAngle = 270 - ((serverResult - 1) * deg) - (deg / 2);
            
            const extraSpins = 3600; 
            let nextRotation = currentRotation + extraSpins + (targetAngle - (currentRotation % 360));
            
            if (nextRotation <= currentRotation) nextRotation += 360;
            
            currentRotation = nextRotation; // Save for next time

            // 3. ANIMATE
            canvas.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0.1, 1)';
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                let winningCard = CARD_MAP[serverResult - 1];
                let totalWin = 0;
                let winKey = String(serverResult); 

                // Calculate win amount
                if(cycleBets[winKey] && cycleBets[winKey] > 0) {
                    totalWin = cycleBets[winKey] * 10 * serverMulti;
                }

                // 🟢 NEW: Format the text for the #msg element
                let jackpotText = (serverMulti > 1) ? ` (JACKPOT ${serverMulti}X!)` : "";
                let msgEl = document.getElementById('msg');
                
                if (totalWin > 0) {
                    // Won: Show WINNER in Green
                    msgEl.innerHTML = `<span style="color:#28a745;">WINNER: ${winningCard.rank} ${winningCard.suit} | ₹${totalWin.toLocaleString()}${jackpotText}</span>`;
                } else if (serverMulti > 1) {
                    // Lost, but there was a Jackpot
                    msgEl.innerHTML = `<span style="color:${winningCard.color}">RESULT: ${winningCard.rank} ${winningCard.suit}</span> <span style="color:#d32f2f; font-size:16px;">${jackpotText}</span>`;
                } else {
                    // Normal Loss
                    msgEl.innerHTML = `<span style="color:${winningCard.color}">RESULT: ${winningCard.rank} ${winningCard.suit}</span>`;
                }

                // Hide the old floating box
                document.getElementById('winDisplay').classList.remove('show');

                if(serverMulti > 1) triggerRain();

                // Clear bets
                bets = {};
                localStorage.setItem('vegas_active_bets', '{}');
                renderSlip();
                clearVisualBets();
               
                // 🟢 NEW: CALCULATE NET WIN/LOSS FOR THE ROUND
                let totalRoundPlay = 0;
                for (let key in cycleBets) {
                    totalRoundPlay += cycleBets[key];
                }

                let netResult = totalWin - totalRoundPlay;
                const wlBox = document.getElementById('roundWinLoss');

                if (totalRoundPlay === 0) {
                    wlBox.innerText = "-";
                    wlBox.className = "stat-neutral";
                } else if (netResult > 0) {
                    wlBox.innerText = "+₹" + netResult.toLocaleString();
                    wlBox.className = "stat-win"; // Turns Green
                } else if (netResult < 0) {
                    wlBox.innerText = "-₹" + Math.abs(netResult).toLocaleString();
                    wlBox.className = "stat-loss"; // Turns Red
                } else {
                    wlBox.innerText = "₹0";
                    wlBox.className = "stat-neutral"; // Turns White
                }

                // 4. UNLOCK LOGIC (Game Loop continues after 4s)
                setTimeout(() => {
                    isSpinning = false;
                }, 4000);

              // 5. SET NEW 2-MINUTE CLEANUP TIMER
                visualCleanupTimer = setTimeout(() => {
                    document.getElementById('msg').innerHTML = "RESULTS";
                    document.getElementById('msg').style.color = "var(--text-gold)";
                }, 120000);

            }, 8000);
                }

        // --- VISUAL FX ---
        let coins = [];
        class Coin { 
            constructor() { 
                this.x = Math.random() * window.innerWidth; 
                this.y = -50; 
                this.vel = Math.random() * 4 + 2; 
            } 
            update() { 
                this.y += this.vel; 
                jCtx.beginPath(); 
                jCtx.fillStyle = '#ffd700'; 
                jCtx.arc(this.x, this.y, 8, 0, Math.PI*2); 
                jCtx.fill(); 
            } 
        }

        function triggerRain() {
            jCanvas.width = window.innerWidth; 
            jCanvas.height = window.innerHeight;
            coins = Array.from({length: 300}, () => new Coin());
            
            function anim() { 
                jCtx.clearRect(0,0,jCanvas.width, jCanvas.height); 
                coins.forEach(c => c.update()); 
                if(coins.some(c => c.y < window.innerHeight + 100)) {
                    requestAnimationFrame(anim); 
                } else {
                    jCtx.clearRect(0,0,jCanvas.width, jCanvas.height); 
                }
            }
            anim();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function unlockGame() {
            const p = document.getElementById('gamePass').value;
            if(p === 'qsc123') {
                sessionStorage.setItem('vegasSession', 'active'); 
                document.getElementById('securityOverlay').style.display = 'none';
            } else {
                document.getElementById('passError').style.display = 'block';
            }
        }

        // Detect when printing finishes and try to restore fullscreen
        window.addEventListener("afterprint", (event) => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((e) => {
                    console.log("User must click to restore fullscreen");
                });
            }
        });
        
    </script>
