<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Vegas 12 - Midnight Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
       :root {
            /* THEME: Light Aesthetic / Old Money Cream */
            --bg-gradient: linear-gradient(135deg, #EAE5D9 0%, #D8D0C1 100%); /* Old Money Cream */
            --glass-panel: rgba(255, 255, 255, 0.85); /* Frosted white glass */
            --border-neon: 1px solid rgba(212, 175, 55, 0.4); /* Soft Gold border */
            --text-gold: #b8860b; /* Darker goldenrod for readability on light bg */
            --text-cyan: #0056b3; /* Classic royal blue instead of neon */
            --felt-blue: #fdfbfb; /* Clean cream/white instead of dark felt */
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.08); /* Very soft shadow */
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #EAE5D9; 
            background-image: var(--bg-gradient);
            color: #333; /* Dark gray text for readability */
            font-family: 'Roboto', sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- TOP BAR --- */
        .top-bar { 
            height: 70px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            padding: 0 30px; 
            background: rgba(255, 255, 255, 0.95); 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            z-index: 10;
        }
        
        .top-left { display: flex; align-items: center; gap: 20px; }
        .top-right { display: flex; justify-content: flex-end; align-items: center; }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            background: linear-gradient(to right, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        /* TIMER */
        .timer-box { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 36px; 
            color: #d32f2f; /* Casino Red */
            background: rgba(255, 255, 255, 0.8); 
            padding: 2px 30px; 
            border-radius: 4px; 
            border: 1px solid rgba(211, 47, 47, 0.3);
            letter-spacing: 2px;
            box-shadow: 0 2px 10px rgba(211, 47, 47, 0.1);
        }
        
        /* VOLUME BOX */
        .vol-box { 
            text-align: right; 
            background: transparent; 
            padding: 5px 20px; 
            border-right: 3px solid var(--text-gold); 
            cursor: pointer; 
            transition: 0.3s;
        }
        .vol-box:hover { background: rgba(0,0,0,0.03); border-radius: 4px; }
        .vol-box small { color: #666; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .vol-box span { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: bold; color: #222; }
        
        .vol-positive { color: #28a745; }
        .vol-negative { color: #d32f2f; }

        /* --- MAIN LAYOUT --- */
  .game-hud { 
    flex: 1;
    display: grid;
    grid-template-columns: 480px 1fr; /* Reduced to scale down cards */
    gap: 20px; /* Reduced gap */
    padding: 10px 20px; /* Reduced vertical padding */
    height: calc(100vh - 70px);
    align-items: center;
    justify-content: space-between; 
}
        
        /* PANEL STYLES */
       .panel {
    background: var(--glass-panel);
    backdrop-filter: blur(12px);
    border: var(--border-neon);
    border-radius: 12px;
    padding: 15px;
    box-shadow: var(--shadow-soft);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
}

        .center-panel { 
    background: transparent; 
    border: none; 
    box-shadow: none; 
    backdrop-filter: none;
    position: relative;

    display: flex;
    flex-direction: column;

    align-items: flex-end;   /* pushes wheel to the right */
    justify-content: center; /* keeps vertical alignment same */

    height: 100%;
    padding-right: 40px;     /* small spacing from screen edge */
}

        /* --- BETTING GRID --- */
       .grid-12 { 
    display: grid; 
    grid-template-columns: repeat(4,1fr);
    gap: 10px; /* Reduced from 20px */
    width: 100%; 
    margin-bottom: 10px; 
    background: transparent; 
    border: none; 
    box-shadow: none;
    padding: 0;
}
        
        .grid-12.locked { filter: grayscale(100%) brightness(0.9); pointer-events: none; opacity: 0.7;}

       .num-btn { 
    aspect-ratio: 3/ 4; /* CHANGED: better proportions for playing cards */
    background: #fff;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
    padding: 0; /* CHANGED: remove padding so the image goes edge-to-edge */
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    overflow: hidden;
}
        
        .num-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4); 
        }
        .num-btn:active { transform: translateY(2px); box-shadow: none; }
        
      .num-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
        /* --- CHIPS --- */
       .chip-rack { 
    display: flex; justify-content: space-around; 
    background: rgba(0,0,0,0.03); 
    padding: 10px; /* Reduced from 15px */
    border-radius: 50px; 
    border: 1px solid rgba(0,0,0,0.05); 
    margin-top: auto;
}

.chip { 
    width: 42px; /* Reduced from 50px */
    height: 42px; /* Reduced from 50px */
    border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; 
    font-weight: bold; font-family: 'Roboto', sans-serif; font-size: 12px; color: white;
    cursor: pointer; border: 2px dashed rgba(255,255,255,0.8); 
    box-shadow: 0 3px 5px rgba(0,0,0,0.2); 
    transition: 0.2s; 
}
        .chip:hover { transform: translateY(-5px); }
        .chip.active { 
            border-style: solid; border-color: #333; 
            box-shadow: 0 0 10px rgba(0,0,0,0.3); 
            transform: scale(1.1) translateY(-10px); z-index: 2; 
        }
        .c5 { background: radial-gradient(#8e2de2, #4a00e0); }
        .c10 { background: radial-gradient(#00c6ff, #0072ff); } 
        .c20 { background: radial-gradient(#ff416c, #ff4b2b); } 
        .c50 { background: radial-gradient(#56ab2f, #a8e063); color: black; border-color: rgba(0,0,0,0.3); } 
        .c100 { background: radial-gradient(#333, #111); border-color: var(--text-gold); color: var(--text-gold); }

        /* --- WHEEL AREA --- */
        .wheel-container { 
            position: relative; 
            width: 620px; height: 620px; 
            border-radius: 50%; 
            padding: 12px;
            background: conic-gradient(from 0deg, #d4af37, #fcf6ba, #d4af37, #fcf6ba, #d4af37);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            transition: transform 0.3s;
        }
        .wheel-inner {
            width: 100%; height: 100%; border-radius: 50%;
            border: 8px solid #fff; /* White rim instead of black */
            background: #fff;
            overflow: hidden;
            position: relative;
        }
        canvas { width: 100%; height: 100%; }
        
      #pointer { 
    position: absolute; 
    top: -15px; /* Adjusted for smaller wheel */
    left: 50%; 
    transform: translateX(-50%); 
    width: 0; height: 0; 
    border-left: 15px solid transparent; /* Scaled down */
    border-right: 15px solid transparent; /* Scaled down */
    border-top: 40px solid #d32f2f; /* Scaled down from 55px */
    filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3)); 
    z-index: 5; 
}

        /* --- STATUS --- */
       .status-msg { 
    margin-top: 15px; /* Reduced from 30px */
    font-family: 'Cinzel', serif; 
    font-size: 24px; /* Reduced from 28px */
    font-weight: bold; letter-spacing: 4px; 
    text-align: center; color: #222; 
}
        .status-msg.locked-msg { color: #d32f2f; }

        .history-bar { 
    margin-top: 10px; /* Reduced from 20px */
    display: flex; gap: 12px; 
    justify-content: center; height: 50px; /* Reduced from 60px */
}
        .hist-bubble { 
            width: 58px; height: 58px; /* 2 RS COIN SIZE */
            border-radius: 50%; 
            background: #fff; 
            border: 2px solid var(--text-gold); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: #333; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            font-size: 22px; /* BIGGER TEXT */
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- SLIP & TABLES --- */
        .slip-header { 
            text-align: center; color: var(--text-cyan); font-family: 'Cinzel', serif; 
            font-size: 18px; border-bottom: 1px solid rgba(0,0,0,0.1); 
            padding-bottom: 15px; margin-bottom: 10px; letter-spacing: 2px;
        }
        .slip-content { flex: 1; overflow-y: auto; padding-right: 5px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 10px; color: #888; text-align: left; padding-bottom: 8px; letter-spacing: 1px; }
        td { padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; color: #444; }
        .num-cell { color: #d32f2f; font-weight: bold; font-size: 16px; }
        
        .btn-cancel { 
            background: transparent; border: 1px solid #d32f2f; color: #d32f2f; 
            border-radius: 4px; padding: 4px 8px; font-size: 10px; cursor: pointer; transition: 0.2s; 
        }
        .btn-cancel:hover { background: #d32f2f; color: white; }
        
        .total-row { 
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(0,0,0,0.2); 
            font-size: 20px; color: var(--text-gold); font-family: 'Cinzel', serif; 
            display: flex; justify-content: space-between; font-weight: bold;
        }
        
        .win-box { 
            text-align: center; font-size: 26px; margin: 15px 0; min-height: 40px; 
            color: #28a745; font-family: 'Orbitron', sans-serif; font-weight: bold; opacity: 0; transition: opacity 0.5s; 
        }
        .win-box.show { opacity: 1; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

       .btn-print { 
    width: 100%; 
    padding: 12px; /* Reduced from 15px */
    font-size: 14px; 
    font-weight: bold; 
    text-transform: uppercase; letter-spacing: 2px;
    background: linear-gradient(45deg, #d4af37, #ffd700); 
    border: none; border-radius: 6px; cursor: pointer; color: #222; 
    box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); transition: 0.3s; 
    margin-top: 10px !important; /* Forces tighter spacing above print button */
}
        .btn-print:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(212, 175, 55, 0.5); }

        #coinCanvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }
        
        .logout-btn { 
            background: #fff; color: #555; 
            border: 1px solid #ddd; padding: 6px 12px; cursor: pointer; 
            border-radius: 4px; font-size: 11px; letter-spacing: 1px; transition: 0.3s; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .logout-btn:hover { border-color: #d32f2f; color: #d32f2f; background: #fff5f5; }

        .contact-btn { 
            background: #fff; 
            color: #0056b3; 
            border: 1px solid #0056b3; 
            padding: 6px 12px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 11px; 
            letter-spacing: 1px; 
            text-decoration: none; 
            transition: 0.3s; 
            display: flex; align-items: center; gap: 5px; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .contact-btn:hover { background: #f0f7ff; }

        .add-money-btn {
            background: linear-gradient(45deg, #28a745, #218838);
            color: white; border: none; padding: 8px 15px; margin-right: 15px;
            border-radius: 4px; font-weight: bold; font-size: 12px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3); transition: 0.3s; letter-spacing: 1px;
        }
        .add-money-btn:hover { transform: scale(1.05); box-shadow: 0 6px 15px rgba(40, 167, 69, 0.5); }

       .fullscreen-btn {
    margin-top: 10px; /* Reduced from 20px */
    background: #fff; border: 1px solid #ddd; color: #555;
    padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'Roboto', sans-serif;
    font-size: 10px; letter-spacing: 2px; transition: all 0.3s; text-transform: uppercase;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
        .fullscreen-btn:hover { border-color: #d4af37; color: #b8860b; background: #fffdf5; transform: translateY(-2px); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* --- RESPONSIVE & PRINT MEDIA --- */
        @media (max-width: 1400px), (max-height: 850px) {
    .wheel-container { 
    position: relative; 
    width: 480px; /* Reduced from 620px */
    height: 480px; /* Reduced from 620px */
    border-radius: 50%; 
    padding: 10px; /* Reduced from 12px */
    background: conic-gradient(from 0deg, #d4af37, #fcf6ba, #d4af37, #fcf6ba, #d4af37);
    box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
    transition: transform 0.3s;
}
    .grid-12 { 
        gap: 12px; 
    }

    .num-btn { 
        font-size: 20px; 
    }

    .chip { 
        width: 40px; 
        height: 40px; 
        font-size: 11px; 
    }

   .game-hud { 
    grid-template-columns: 520px 1fr;
}
}

        @media (max-width: 900px) {
            body { height: auto; overflow-y: auto; display: block; }
            .top-bar { display: flex; justify-content: space-between; position: sticky; top: 0; }
            .game-hud { display: flex; flex-direction: column; height: auto; padding-bottom: 50px; }
            .panel { height: auto; max-width: 100%; }
            .center-panel { order: 1; width: 100%; padding: 20px 0; }
            .left-panel { order: 2; width: 100%; }
            .right-panel { order: 3; width: 100%; }
            .wheel-container { width: 280px; height: 280px; }
            #pointer { top: -20px; border-width: 0 15px 35px 15px; }
            .grid-12 { gap: 10px; }
            .num-btn { padding: 20px 0; }
        }

        @media print {
            * { color: black !important; background: transparent !important; text-shadow: none !important; box-shadow: none !important; backdrop-filter: none !important; filter: none !important; }
            @page { margin: 0; size: 58mm auto; }
            body { width: 55mm; margin: 0 auto; padding: 0; font-family: 'Courier New', monospace; font-size: 11px; display: block !important; height: auto !important; overflow: visible !important; }
            body > *:not(.game-hud), .top-bar, .left-panel, .center-panel, .admin-trigger, .win-box, .fullscreen-btn, .chip-rack, .grid-12, #timer, .slip-header, .btn-print, #securityOverlay { display: none !important; }
            .game-hud, .panel, .slip-panel { display: block !important; width: 100% !important; height: auto !important; border: none !important; margin: 0 !important; padding: 2px !important; grid-template-columns: 1fr !important; }
            .print-header, .print-footer { display: block !important; text-align: center; }
            .print-logo { font-size: 14px; font-weight: bold; border-bottom: 1px dashed #000; padding-bottom: 4px; margin-bottom: 4px; }
            .print-meta { font-size: 9px; margin-bottom: 8px; }
            .print-footer { margin-top: 10px; border-top: 1px dashed #000; padding-top: 4px; font-size: 9px; }
            .slip-content { overflow: visible !important; height: auto !important; }
            table { width: 100%; border-collapse: collapse; table-layout: fixed; }
            th { border-bottom: 1px solid #000 !important; font-size: 10px; text-align: left; }
            td { border-bottom: 1px dashed #666 !important; padding: 3px 0; font-size: 12px; font-weight: bold; }
            .no-print, th:nth-child(3), td:nth-child(3) { display: none !important; }
            th:nth-child(1), td:nth-child(1) { text-align: left; width: 50%; }
            th:nth-child(2), td:nth-child(2) { text-align: right !important; width: 50%; }
            .total-row { border-top: 2px solid #000 !important; font-weight: bold; font-size: 14px; margin-top: 5px; padding-top: 5px; display: flex; justify-content: space-between; }
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .top-bar { position: sticky; top: 0; z-index: 100; padding: 0 12px; height: 60px; }
            .logo-text { font-size: 16px; }
            .timer-box { font-size: 22px; padding: 2px 14px; }
            .game-hud { display: flex; flex-direction: column; gap: 12px; padding: 10px; height: auto; }
            .left-panel, .right-panel { width: 100%; max-width: 100%; }
            .center-panel { order: 1; padding: 10px 0; }
            .left-panel { order: 2; }
            .right-panel { order: 3; }
            .wheel-container { width: 260px; height: 260px; }
            #pointer { top: -18px; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 32px solid #d32f2f; }
            .grid-12 { grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 8px; }
            .num-btn { font-size: 18px; padding: 16px 0; }
            .chip-rack { padding: 10px; }
            .chip { width: 42px; height: 42px; font-size: 12px; }
            .slip-header { font-size: 14px; }
            .total-row { font-size: 16px; }
            .btn-print { font-size: 14px; padding: 12px; }
            .status-msg { font-size: 18px; letter-spacing: 2px; margin-top: 15px; }
            
            /* INCREASED SIZES FOR MOBILE RESULTS */
            .history-bar { height: 50px; margin-top: 10px; }
            .hist-bubble { width: 48px; height: 48px; font-size: 18px; }
        }

        #securityOverlay { background: #EAE5D9; }
        #gamePass { background: #fff; color: #333; border: 1px solid #ccc; }

    </style>
</head>

      function drawWheel() {
    canvas.width = 1000; canvas.height = 1000;
    for(let i=0; i<sectors; i++) {
        const angle = i * arc;
        const card = CARD_MAP[i];
        
        ctx.beginPath(); 
        ctx.fillStyle = i % 2 === 0 ? "#fdfbfb" : "#f5f0e1"; // Card backgrounds
        ctx.moveTo(500, 500); 
        ctx.arc(500, 500, 500, angle, angle + arc); 
        ctx.fill();
        
        ctx.strokeStyle = "#daa520"; 
        ctx.lineWidth = 10; 
        ctx.stroke();
        
        ctx.save(); 
        ctx.translate(500, 500); 
        ctx.rotate(angle + arc / 2);
        
        ctx.textAlign = "right"; 
        ctx.fillStyle = card.color; 
        ctx.font = "bold 70px 'Cinzel', serif";
        
        // Draw the Rank and Suit on the wheel (Text instead of Image)
        ctx.fillText(`${card.rank} ${card.suit}`, 460, 25); 
        
        ctx.restore();
    }
}

                if(winText) {
                    const winBox = document.getElementById('winDisplay');
                    winBox.innerText = winText;
                    winBox.classList.add('show');
                }

                if(serverMulti > 1) triggerRain();

                // 4. UNLOCK LOGIC (Game Loop continues after 4s)
                setTimeout(() => {
                    isSpinning = false;
                }, 4000);

                // 5. SET NEW 2-MINUTE CLEANUP TIMER
                visualCleanupTimer = setTimeout(() => {
                    document.getElementById('winDisplay').classList.remove('show');
                }, 120000); 

            }, 8000);
                }

        // --- VISUAL FX ---
        let coins = [];
        class Coin { 
            constructor() { 
                this.x = Math.random() * window.innerWidth; 
                this.y = -50; 
                this.vel = Math.random() * 4 + 2; 
            } 
            update() { 
                this.y += this.vel; 
                jCtx.beginPath(); 
                jCtx.fillStyle = '#ffd700'; 
                jCtx.arc(this.x, this.y, 8, 0, Math.PI*2); 
                jCtx.fill(); 
            } 
        }

        function triggerRain() {
            jCanvas.width = window.innerWidth; 
            jCanvas.height = window.innerHeight;
            coins = Array.from({length: 300}, () => new Coin());
            
            function anim() { 
                jCtx.clearRect(0,0,jCanvas.width, jCanvas.height); 
                coins.forEach(c => c.update()); 
                if(coins.some(c => c.y < window.innerHeight + 100)) {
                    requestAnimationFrame(anim); 
                } else {
                    jCtx.clearRect(0,0,jCanvas.width, jCanvas.height); 
                }
            }
            anim();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function unlockGame() {
            const p = document.getElementById('gamePass').value;
            if(p === 'qsc123') {
                sessionStorage.setItem('vegasSession', 'active'); 
                document.getElementById('securityOverlay').style.display = 'none';
            } else {
                document.getElementById('passError').style.display = 'block';
            }
        }

        // Detect when printing finishes and try to restore fullscreen
        window.addEventListener("afterprint", (event) => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((e) => {
                    console.log("User must click to restore fullscreen");
                });
            }
        });
        
    </script>
    
</body>
